<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.name }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{ site.baseurl }}/feed.xml">
  <meta property="og:site_name" content="{{ site.name }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.name }}{% endif %}">
  <meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="{% if page.date %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;600;700&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,600;1,7..72,400&display=swap" rel="stylesheet">
  <script src="{{ site.baseurl }}/js/jquery.min.js"></script>
  <script src="{{ site.baseurl }}/js/bootstrap.min.js"></script>
  <link href="{{ site.baseurl }}/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ site.baseurl }}/css/theme.css" rel="stylesheet">
  {% if page.layout == 'post' %}
  <script>
    (function () {
      try {
        var mode = localStorage.getItem('hg-reading-mode') || 'comfort';
        if (mode !== 'wide' && mode !== 'comfort') mode = 'comfort';
        document.documentElement.dataset.readingMode = mode;
      } catch (e) {
        document.documentElement.dataset.readingMode = 'comfort';
      }
    })();
  </script>
  {% endif %}
</head>
<body{% if page.layout == 'home' %} class="is-home"{% elsif page.layout == 'post' %} class="is-post"{% endif %}>

  <nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container">
      <div class="navbar-header">
        <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#site-nav" aria-expanded="false" aria-controls="site-nav">
          <span class="sr-only">Toggle navigation</span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
        </button>
        <a class="navbar-brand" href="{{ site.baseurl }}/">{{ site.name }}</a>
      </div>
      <div class="collapse navbar-collapse" id="site-nav">
        <ul class="nav navbar-nav">
          <li><a href="{{ site.baseurl }}/">首页</a></li>
          <li><a href="{{ site.baseurl }}/about">关于</a></li>
          <li><a href="https://hypergroups.github.io/hypergroups/" rel="noopener">项目</a></li>
          <li><a href="{{ site.baseurl }}/wolfram">Wolfram</a></li>
          <li><a href="{{ site.baseurl }}/search.html">搜索</a></li>
          <li><a href="{{ site.baseurl }}/archives.html">早期笔记</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container{% if page.layout == 'home' %} container-portal{% endif %}">
